name: Release

# Build pre-built x64 binaries for macOS and Windows and attach them to a
# GitHub Release. Other platforms (Linux, ARM, …) build from source — see
# the README "Installation" section. Triggered by pushing a `v*` tag, or
# manually via the Actions tab (workflow_dispatch) for a dry-run/manual cut.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build & publish (e.g. v0.1.0)'
        required: true

permissions:
  contents: write   # create the Release and upload assets

env:
  CARGO_TERM_COLOR: always

jobs:
  dist:
    name: dist · ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13                  # Intel host → native x86_64 build
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable · ${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked -p rivus-cli --target ${{ matrix.target }}

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package (unix tarball)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          name="rivus-${tag}-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          cp "target/${{ matrix.target }}/release/rivus" "dist/${name}/"
          cp README.md LICENSE NOTICE "dist/${name}/"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          ( cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256" )
          echo "ASSET=dist/${name}.tar.gz" >> "$GITHUB_ENV"
          echo "ASSET_SHA=dist/${name}.tar.gz.sha256" >> "$GITHUB_ENV"

      - name: Package (windows zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag  = "${{ steps.tag.outputs.tag }}"
          $name = "rivus-$tag-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/rivus.exe" "dist/$name/"
          Copy-Item README.md,LICENSE,NOTICE "dist/$name/"
          Compress-Archive -Path "dist/$name/*" -DestinationPath "dist/$name.zip" -Force
          $hash = (Get-FileHash "dist/$name.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $name.zip" | Out-File -Encoding ascii "dist/$name.zip.sha256"
          "ASSET=dist/$name.zip"           | Out-File -Append -Encoding ascii $env:GITHUB_ENV
          "ASSET_SHA=dist/$name.zip.sha256" | Out-File -Append -Encoding ascii $env:GITHUB_ENV

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: rivus-${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET_SHA }}
          if-no-files-found: error

      - name: Publish to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          # Idempotent + race-tolerant: the two matrix jobs may reach here at
          # the same time, so creating an existing release must not fail.
          gh release view "$tag" >/dev/null 2>&1 || \
            gh release create "$tag" \
              --title "Rivus $tag" \
              --notes "Pre-built x64 binaries for macOS and Windows. Other platforms: build from source (see README → Installation)." \
            || true
          gh release upload "$tag" "$ASSET" "$ASSET_SHA" --clobber
