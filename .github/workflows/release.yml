name: Release

# Build release binaries and attach them to a GitHub Release. Two flavors per
# platform are published side by side:
#
#   * "portable"  — a multi-architecture baseline build that runs on the widest
#                   range of CPUs of that family (e.g. any x64, Intel included).
#   * "tuned"     — a microarchitecture-specialized build (-C target-cpu=…) that
#                   is faster but only runs on that CPU generation or newer.
#
# Platforms (everything else builds from source — see README → Installation):
#   * macOS  : Apple Silicon (M1 and later) only — no legacy Intel Mac.
#   * Windows: 11+ x64 — portable (Intel & older AMD) + **Intel 11th-gen Core
#              (Tiger Lake) featured** + AMD Zen 4 / Zen 3 tuned.
#
# Triggered by pushing a `v*` tag, or manually via the Actions tab.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build & publish (e.g. v0.1.0)'
        required: true

permissions:
  contents: write   # create the Release and upload assets

env:
  CARGO_TERM_COLOR: always

jobs:
  dist:
    name: dist · ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- macOS: Apple Silicon (M1+) only ----------------------------
          - os: macos-14                  # Apple Silicon runner → native arm64
            target: aarch64-apple-darwin
            label: macos-arm64            # portable across all Apple Silicon
            rustflags: ""
          - os: macos-14
            target: aarch64-apple-darwin
            label: macos-arm64-appleM-tuned
            rustflags: "-C target-cpu=apple-m1"   # tuned, runs on all M1+

          # ---- Windows 11+ x64 --------------------------------------------
          # ★ FEATURED: Intel 11th-gen Core i5 (Tiger Lake, 4C/8T) on Win11 —
          #   the maintainer's primary machine. `tigerlake` enables AVX2 +
          #   AVX-512 + BMI2, which the SWAR/SIMD CSV scan and exact integer
          #   lanes exploit. Runs only on Tiger Lake or newer.
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64-intel-tigerlake
            rustflags: "-C target-cpu=tigerlake"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64-portable   # baseline x64: Intel & older AMD too
            rustflags: "-C target-cpu=x86-64"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64-amd-zen4   # tuned: AMD Zen 4 (Ryzen 7000+)
            rustflags: "-C target-cpu=znver4"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64-amd-zen3   # tuned: AMD Zen 3 (Ryzen 5000+)
            rustflags: "-C target-cpu=znver3"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable · ${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --locked -p rivus-cli --target ${{ matrix.target }}

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package (unix tarball)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          name="rivus-${tag}-${{ matrix.label }}"
          mkdir -p "dist/${name}"
          cp "target/${{ matrix.target }}/release/rivus" "dist/${name}/"
          cp README.md LICENSE NOTICE "dist/${name}/"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          ( cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256" )
          echo "ASSET=dist/${name}.tar.gz" >> "$GITHUB_ENV"
          echo "ASSET_SHA=dist/${name}.tar.gz.sha256" >> "$GITHUB_ENV"

      - name: Package (windows zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag  = "${{ steps.tag.outputs.tag }}"
          $name = "rivus-$tag-${{ matrix.label }}"
          New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/rivus.exe" "dist/$name/"
          Copy-Item README.md,LICENSE,NOTICE "dist/$name/"
          Compress-Archive -Path "dist/$name/*" -DestinationPath "dist/$name.zip" -Force
          $hash = (Get-FileHash "dist/$name.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $name.zip" | Out-File -Encoding ascii "dist/$name.zip.sha256"
          "ASSET=dist/$name.zip"            | Out-File -Append -Encoding ascii $env:GITHUB_ENV
          "ASSET_SHA=dist/$name.zip.sha256" | Out-File -Append -Encoding ascii $env:GITHUB_ENV

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: rivus-${{ matrix.label }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET_SHA }}
          if-no-files-found: error

      - name: Publish to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          # A tag with a SemVer pre-release suffix (e.g. `v1.2.0-dev.1`,
          # `-rc.1`, `-alpha`) is a development build → flag the GitHub Release
          # as a pre-release so it never shows up as "Latest". Stable `vX.Y.Z`
          # tags publish as a full release.
          prerelease=""
          case "$tag" in *-*) prerelease="--prerelease" ;; esac
          # Idempotent + race-tolerant: matrix jobs may reach here together, so
          # creating an already-existing release must not fail the job.
          gh release view "$tag" >/dev/null 2>&1 || \
            gh release create "$tag" $prerelease \
              --title "Rivus $tag" \
              --notes "Pre-built binaries. macOS: Apple Silicon (M1+). Windows 11+ x64: **recommended \`windows-x64-intel-tigerlake\`** (tuned for 11th-gen Intel Core i5 / Tiger Lake, AVX-512) + portable (any Intel/AMD x64) + AMD Zen 4 / Zen 3 tuned. Each platform ships a portable (multi-arch) and CPU-tuned builds; pick the tuned build matching your CPU, else portable. Other platforms: build from source (see README → Installation)." \
            || true
          gh release upload "$tag" "$ASSET" "$ASSET_SHA" --clobber
