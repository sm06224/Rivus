name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  secret-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  supply-chain:
    name: cargo-deny (advisories · licenses · bans · sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Test
        run: cargo test --workspace

      # Exercise the off-by-default `regex` feature so the gated `regexp()`
      # path can't rot (the rest of CI builds default = zero-dependency).
      - name: Clippy (regex feature)
        run: cargo clippy -p rivus-runtime -p rivus-cli --features rivus-cli/regex --all-targets

      - name: Test (regex feature)
        run: cargo test -p rivus-runtime --features regex

      # Exercise the off-by-default `gzip` feature (flate2, pure-Rust backend)
      # so the `.gz` source path stays green; default CI stays zero-dependency.
      - name: Clippy (gzip feature)
        run: cargo clippy -p rivus-runtime -p rivus-cli --features rivus-cli/gzip --all-targets

      - name: Test (gzip feature)
        run: cargo test -p rivus-runtime --features gzip

      # Exercise the off-by-default `zstd` feature (ruzstd, pure-Rust decoder).
      - name: Clippy (zstd feature)
        run: cargo clippy -p rivus-runtime -p rivus-cli --features rivus-cli/zstd --all-targets

      - name: Test (zstd feature)
        run: cargo test -p rivus-runtime --features zstd

      - name: Build release
        run: cargo build --workspace --release

  duckdb-parity:
    name: DuckDB parity oracle (informational)
    runs-on: ubuntu-latest
    # Non-blocking / informational: the migration parity diff must never red the
    # main gate (the default build stays zero-dependency; DuckDB lives only here,
    # as an external CLI). A divergence shows in this job's log without failing
    # the required checks.
    continue-on-error: true
    env:
      DUCKDB_VERSION: v1.1.3   # official release binary, pinned & version-checked
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install DuckDB CLI (official release binary)
        run: |
          set -euo pipefail
          curl -fsSL -o duckdb.zip \
            "https://github.com/duckdb/duckdb/releases/download/${DUCKDB_VERSION}/duckdb_cli-linux-amd64.zip"
          unzip -o duckdb.zip
          sudo mv duckdb /usr/local/bin/duckdb
          got="$(duckdb --version)"
          echo "duckdb: $got"
          case "$got" in *"${DUCKDB_VERSION#v}"*) : ;; *) echo "version mismatch"; exit 1 ;; esac

      - name: Run the DuckDB parity oracle
        run: cargo test -p rivus-runtime --test duckdb_parity -- --nocapture

  bench-smoke:
    name: benches compile & smoke-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # `--test` runs each benchmark once for correctness without the slow
      # statistical measurement loop, so CI stays fast but benches can't rot.
      - name: Smoke-run benchmarks
        run: cargo bench -p rivus-runtime -- --test
