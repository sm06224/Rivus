# cargo-deny configuration — supply-chain policy for Rivus.
#
# Philosophy: the *shipped* runtime (rivus-core/ir/parser/optimizer/runtime/cli)
# has ZERO third-party dependencies; everything below the line is dev-only
# (criterion and its tree). We still vet the full graph: advisories, licenses,
# sources, and version hygiene. Run locally with `cargo deny check`.

[graph]
all-features = true

[advisories]
version = 2
# Fail on any RUSTSEC advisory or yanked crate. No exceptions are carried; if
# one becomes necessary it must be added here with a justifying comment.
yanked = "deny"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.9
# The allow-list is intentionally forward-looking (covers permissive licenses we
# may pull in later), so don't warn about entries not currently encountered.
unused-allowed-license = "allow"
# Permissive licenses only. Copyleft/unknown licenses are rejected by omission.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]

[bans]
# Surface dependency bloat and accidental duplication.
multiple-versions = "warn"
# A `version = "*"` dependency is an unbounded supply-chain hole.
wildcards = "deny"
# ...except our own internal path crates, which legitimately have no version.
allow-wildcard-paths = true
deny = []

[sources]
# Only crates.io is trusted. No arbitrary git or alternative registries.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
